<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inventario Tienda Tech</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
  <h1>Inventario de Tienda</h1>

  <!-- Registrar producto -->
  <section>
    <h2>Registrar producto</h2>

    <label>Nombre:</label>
    <input type="text" id="nombre">

    <label>Precio ($):</label>
    <input type="number" id="precio">

    <label>Cantidad:</label>
    <input type="number" id="cantidad">

    <button class="btn primary" onclick="agregarProducto()">Agregar producto</button>
  </section>

  <hr>

  <!-- Seleccionar producto -->
  <section>
    <h2>Consultar producto</h2>

    <select id="productoSelect"></select>
    <button class="btn secondary" onclick="verProducto()">Ver información</button>
  </section>

  <hr>

  <!-- Valor total -->
  <section>
    <h2>Inventario</h2>
    <button class="btn accent" onclick="calcularTotal()">Calcular valor total</button>
  </section>

  <hr>

  <!-- Resultado -->
  <div class="resultado" id="resultado">
    Aquí verás la información...
  </div>
</div>

<script src="js/Producto.js"></script>
<script src="js/Inventario.js"></script>
<script src="js/app.js"></script>
</body>
</html>
