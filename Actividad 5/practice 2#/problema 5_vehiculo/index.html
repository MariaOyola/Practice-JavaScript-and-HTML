<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Vehículos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
  <h1>🚗 Control de Vehículos</h1>

  <!-- Registrar vehículo -->
  <section>
    <h2>Registrar vehículo</h2>
    <input type="text" id="placa" placeholder="Placa">
    <button class="btn primary" onclick="registrarVehiculo()">Registrar</button>
  </section>

  <hr>

  <!-- Seleccionar vehículo -->
  <section>
    <h2>Seleccionar vehículo</h2>
    <select id="vehiculoSelect"></select>
    <button class="btn secondary" onclick="seleccionarVehiculo()">Seleccionar</button>
  </section>

  <hr>

  <!-- Control de velocidad -->
  <section>
    <h2>Control de velocidad</h2>
    <input type="number" id="velocidad" placeholder="Cantidad a aumentar/disminuir">

    <div class="buttons">
      <button class="btn green" onclick="acelerar()">Aumentar</button>
      <button class="btn red" onclick="frenar()">Disminuir</button>
      <button class="btn blue" onclick="verEstado()">Ver estado</button>
    </div>
  </section>

  <hr>

  <div class="resultado" id="resultado">
    Estado del vehículo...
  </div>
</div>

<script src="js/Vehiculo.js"></script>
<script src="js/Sistema.js"></script>
<script src="js/app.js"></script>
</body>
</html>
