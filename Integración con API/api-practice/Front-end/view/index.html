<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link rel="stylesheet" href="../styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <h1>Lista productos</h1>

    <label>Id</label>
    <input id="idFilter" type="text" class="form-control">

    <button class="btn btn-primary mt-2" onclick="getProductById()">Buscar por ID</button>
    <button class="btn btn-success mt-2" onclick="getAllProducts()">Consultar</button>

    <table class="table mt-3">
        <thead>
            <tr>
                <th>Id</th>
                <th>Title</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="container"></tbody>
    </table>
</div>


<div class="container mt-5">
    <h1>Lista usuarios</h1>

    <label>Id Usuario</label>
    <input id="idUser" type="text" class="form-control">

    <button class="btn btn-primary mt-2" onclick="getUserById()">Buscar Usuario</button>
    <button class="btn btn-success mt-2" onclick="getAllUsers()">Consultar Usuarios</button>

    <table class="table mt-3">
        <thead>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="containerUsers"></tbody>
    </table>
</div>

<script src="../js/const.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>

<script src="../modules/product.js"></script>
<script src="../modules/users.js"></script>
</body>
</html>
