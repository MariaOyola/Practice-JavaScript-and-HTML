<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plataforma de Ejercicios</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
  <h1>🚀 Ejercicios JavaScript</h1>

  <div class="menu">
    <button onclick="mostrar(1)">Ejercicio 1</button>
    <button onclick="mostrar(2)">Ejercicio 2</button>
    <button onclick="mostrar(3)">Ejercicio 3</button>
    <button onclick="mostrar(4)">Ejercicio 4</button>
    <button onclick="mostrar(5)">Ejercicio 5</button>
    <button onclick="mostrar(6)">Ejercicio 6</button>
    <button onclick="mostrar(7)">Ejercicio 7</button>
    <button onclick="mostrar(8)">Ejercicio 8</button>
    <button onclick="mostrar(9)">Ejercicio 9</button>
  </div>

  <div class="contenido">

    <!-- Ejercicio 1 -->
    <section id="ej1" class="ejercicio">
      <button id="boton1">Mostrar mensaje</button>
      <p id="mensaje1"></p>
    </section>

    <!-- Ejercicio 2 -->
    <section id="ej2" class="ejercicio">
      <input id="numero1_e2" type="number" placeholder="Número 1">
      <input id="numero2_e2" type="number" placeholder="Número 2">
      <button id="boton2">Sumar</button>
      <p id="resultado2"></p>
    </section>

    <!-- Ejercicio 3 -->
    <section id="ej3" class="ejercicio">
     <button id="botonrojo">Rojo</button>
     <button id="botonverde">Verde</button>
     <button id="botonazul">Azul</button>
    </section>

    <!-- Ejercicio 4 -->
    <section id="ej4" class="ejercicio">
      <button id="botonContador">Incrementar</button>
      <p id="contador">0</p>
    </section>

    <!-- Ejercicio 5 -->
    <section id="ej5" class="ejercicio">
      <input id="input5" type="text">
      <button id="botonlista">Agregar</button>
      <ul id="lista"></ul>
    </section>

    <!-- Ejercicio 6 -->
    <section id="ej6" class="ejercicio">
      <form id="formulario">
        <input id="nombre6" placeholder="Nombre">
        <input id="edad6" placeholder="Edad">
        <input id="correo6" placeholder="Correo">
        <button type="submit">Enviar</button>
        <p id="error"></p>
      </form>
    </section>

    <!-- Ejercicio 7 -->
    <section id="ej7" class="ejercicio">
      <button id="botonCalcular">Calcular</button>
      <input id="numero1_e7" type="number">
      <input id="numero2_e7" type="number">
      <p id="resultado7"></p>
    </section>

    <!-- Ejercicio 8 -->
    <section id="ej8" class="ejercicio">
      <input id="input_" type="text">
      <button id="botonlista_">Agregar</button>
      <ul id="lista_"></ul>
    </section>

    <!-- Ejercicio 9 -->
    <section id="ej9" class="ejercicio">
      <h2 id="tiemp">0</h2>
      <button onclick="iniciar()">Iniciar</button>
      <button onclick="detener()">Detener</button>
      <button onclick="reiniciar()">Reiniciar</button>
    </section>

  </div>
</div>

<script src="js/main.js"></script>
<script src="ejercicios/ejercicio1.js"></script>
<script src="ejercicios/ejercicio2.js"></script>
<script src="ejercicios/ejercicio3.js"></script>
<script src="ejercicios/ejercicio4.js"></script>
<script src="ejercicios/ejercicio5.js"></script>
<script src="ejercicios/ejercicio6.js"></script>
<script src="ejercicios/ejercicio7.js"></script>
<script src="ejercicios/ejercicio8.js"></script>
<script src="ejercicios/ejercicio9.js"></script>

</body>
</html>
